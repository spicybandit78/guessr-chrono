<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChronoGuessr</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1408;
  --panel: #120f06;
  --paper: #f2e8d0;
  --paper-dark: #e0d0a8;
  --ink: #120f06;
  --sepia: #c8a050;
  --sepia-light: #e8c878;
  --sepia-dim: #4a3410;
  --sepia-glow: rgba(200,160,80,0.15);
  --red: #c03020;
  --green-lit: #3ab870;
  --green-dim: #1a5030;
  --muted: #6a5420;
  --border: #3a2e10;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

/* grain */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  opacity: 0.5; mix-blend-mode: overlay;
}

.app { display: flex; flex-direction: column; height: 100%; }

/* HEADER */
header {
  background: var(--ink); border-bottom: 2px solid var(--sepia-dim);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.logo { font-family: 'Special Elite', cursive; font-size: 22px; color: var(--paper); letter-spacing: 1px; }
.logo span { color: var(--sepia-light); }
.hud { display: flex; align-items: center; gap: 18px; }
.hud-block { text-align: right; }
.hud-lbl { font-family: 'Courier Prime', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.hud-val { font-family: 'Special Elite', cursive; font-size: 20px; color: var(--sepia-light); line-height: 1; }
.pips { display: flex; gap: 6px; align-items: center; }
.pip { width: 10px; height: 10px; border-radius: 1px; background: var(--sepia-dim); border: 1px solid var(--muted); transition: all .3s; transform: rotate(45deg); }
.pip.done { background: var(--sepia-dim); border-color: var(--sepia); }
.pip.cur  { background: var(--sepia); box-shadow: 0 0 8px var(--sepia); }

/* PHOTO */
#photo-wrap {
  flex: 1; position: relative; background: #080604; overflow: hidden;
  display: flex; align-items: center; justify-content: center; min-height: 0;
}
#photo-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.75) 100%);
  pointer-events: none; z-index: 2;
}
#photo { width: 100%; height: 100%; object-fit: cover; display: none; filter: sepia(25%) contrast(1.08) brightness(0.92); }
#photo.loaded { display: block; }

#photo-badge {
  position: absolute; top: 12px; left: 12px;
  background: rgba(18,15,6,.88); border: 1px solid var(--sepia-dim); border-radius: 3px;
  padding: 4px 10px; font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: 2px; color: var(--muted); text-transform: uppercase; z-index: 3; display: none;
}
#round-badge {
  position: absolute; top: 12px; right: 12px;
  background: rgba(18,15,6,.88); border: 1px solid var(--sepia-dim); border-radius: 3px;
  padding: 4px 10px; font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: 2px; color: var(--muted); z-index: 3;
}

#photo-loading { display: flex; flex-direction: column; align-items: center; gap: 14px; z-index: 3; }
.darkroom-spinner { width: 44px; height: 44px; border: 3px solid var(--sepia-dim); border-top-color: var(--sepia); border-radius: 50%; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#photo-loading p { font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; }

/* FILM STRIP HOLES */
.film-holes { display: flex; justify-content: space-between; padding: 5px 6px; background: #0a0804; }
.hole { width: 12px; height: 9px; border-radius: 2px; background: var(--border); border: 1px solid #2a2008; }

/* TIMELINE PANEL */
#timeline-panel { background: var(--ink); border-top: 2px solid var(--sepia-dim); flex-shrink: 0; }

/* Decade bar above slider */
#decade-bar {
  display: flex; align-items: stretch;
  margin: 0 12px; height: 22px;
  position: relative; margin-top: 6px;
}
.decade-tick {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  cursor: pointer; position: relative;
}
.decade-tick::before {
  content: ''; width: 1px; height: 6px; background: var(--sepia-dim); display: block;
}
.decade-tick-lbl {
  font-family: 'Courier Prime', monospace; font-size: 8px; color: var(--sepia-dim);
  letter-spacing: .5px; margin-top: 1px; white-space: nowrap;
  transition: color .15s;
}
.decade-tick:hover .decade-tick-lbl { color: var(--sepia); }
.decade-tick.active .decade-tick-lbl { color: var(--sepia-light); font-weight: 700; }

/* Slider */
#slider-wrap { padding: 4px 12px 2px; }
input[type=range]#timeline-slider {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 6px; background: linear-gradient(90deg, var(--sepia-dim) 0%, var(--sepia-dim) 100%);
  border-radius: 3px; outline: none; cursor: pointer;
}
input[type=range]#timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 32px; height: 32px; border-radius: 4px;
  background: var(--paper); border: 3px solid var(--sepia); cursor: pointer;
  box-shadow: 0 2px 10px rgba(0,0,0,.6); transition: background .1s;
  display: flex; align-items: center; justify-content: center;
}
input[type=range]#timeline-slider:active::-webkit-slider-thumb { background: var(--paper-dark); }

/* Year readout */
#year-readout {
  text-align: center; padding: 4px 0 6px;
  font-family: 'Special Elite', cursive; font-size: 32px;
  color: var(--sepia-light); letter-spacing: 6px;
  text-shadow: 0 0 24px rgba(232,200,120,.25);
  transition: color .1s;
  line-height: 1;
}
#year-readout.unset { color: var(--sepia-dim); letter-spacing: 8px; }

/* Guess footer */
#guess-footer { background: var(--ink); padding: 8px 14px 12px; border-top: 1px solid var(--border); }
#guess-btn {
  width: 100%; background: var(--paper); color: var(--ink);
  font-family: 'Special Elite', cursive; font-size: 17px; letter-spacing: 3px;
  border: none; padding: 13px; border-radius: 3px; cursor: pointer;
  box-shadow: 0 4px 0 var(--sepia-dim), 0 6px 16px rgba(0,0,0,.5); transition: transform .1s, box-shadow .1s;
}
#guess-btn:disabled { background: var(--border); color: var(--muted); box-shadow: none; cursor: not-allowed; }
#guess-btn:not(:disabled):active { transform: translateY(3px); box-shadow: 0 1px 0 var(--sepia-dim); }

/* RESULT OVERLAY */
#result-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(8,6,3,.97); flex-direction: column; overflow-y: auto;
}
#result-overlay.show { display: flex; }
.res-inner {
  width: 100%; max-width: 480px; margin: 0 auto;
  padding: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center;
  min-height: 100%; justify-content: center;
}

#res-photo-wrap {
  width: 100%; border-radius: 3px; overflow: hidden;
  border: 2px solid var(--sepia-dim); position: relative;
  box-shadow: 6px 6px 0 #0a0804;
}
#res-photo { width: 100%; height: 160px; object-fit: cover; filter: sepia(20%) contrast(1.05); display: block; }
#res-caption {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(18,15,6,.92); padding: 7px 12px;
  font-family: 'Courier Prime', monospace; font-size: 11px; color: var(--sepia); letter-spacing: .5px; line-height: 1.4;
}

/* Timeline result bar */
#res-timeline {
  width: 100%; background: rgba(18,15,6,.9); border: 1px solid var(--border);
  border-radius: 3px; padding: 14px;
}
.tl-labels { display: flex; justify-content: space-between; margin-bottom: 10px; }
.tl-item { text-align: center; }
.tl-item-lbl { font-family: 'Courier Prime', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
.tl-item-year { font-family: 'Special Elite', cursive; font-size: 26px; line-height: 1; }
.tl-item-year.actual { color: var(--green-lit); }
.tl-item-year.guess  { color: var(--sepia-light); }
.tl-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; position: relative; margin-top: 4px; }
.tl-marker { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; }
.tl-marker.actual { background: var(--green-lit); border: 2px solid #6ae8a0; box-shadow: 0 0 6px var(--green-lit); }
.tl-marker.guess  { background: var(--sepia); border: 2px solid var(--sepia-light); }
.tl-connector { position: absolute; top: 0; height: 8px; background: rgba(200,160,80,.25); }

.rcard {
  width: 100%; background: rgba(18,15,6,.9); border: 1px solid var(--border);
  border-radius: 3px; padding: 20px; text-align: center;
}
.rtitle { font-family: 'Courier Prime', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.rscore { font-family: 'Special Elite', cursive; font-size: 76px; line-height: 1; color: var(--sepia-light); }
.rpts { font-family: 'Courier Prime', monospace; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.rgrade { font-size: 13px; padding: 4px 14px; border-radius: 2px; display: inline-block; margin-bottom: 8px; font-family: 'Courier Prime', monospace; letter-spacing: 1px; }
.g-perfect { background: rgba(58,184,112,.12); color: var(--green-lit); border: 1px solid var(--green-dim); }
.g-great   { background: rgba(200,160,80,.12); color: var(--sepia-light); border: 1px solid var(--sepia-dim); }
.g-ok      { background: rgba(180,100,40,.12); color: #c86428; border: 1px solid #6a3010; }
.g-miss    { background: rgba(192,48,32,.12);  color: #d04030; border: 1px solid #6a1010; }
.rdiff { font-family: 'Courier Prime', monospace; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.rdiff span { color: var(--paper); }
.ract { display: flex; flex-direction: column; gap: 10px; }
.btn-p {
  background: var(--paper); color: var(--ink); font-family: 'Special Elite', cursive;
  font-size: 17px; letter-spacing: 3px; border: none; padding: 13px; border-radius: 3px;
  cursor: pointer; width: 100%; box-shadow: 0 4px 0 var(--sepia-dim);
}
.btn-p:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--sepia-dim); }
.btn-s {
  background: transparent; color: var(--muted); font-family: 'Courier Prime', monospace;
  font-size: 12px; letter-spacing: 2px; border: 1px solid var(--border);
  padding: 11px; border-radius: 3px; cursor: pointer; width: 100%;
}
.btn-s:active { border-color: var(--sepia); color: var(--sepia); }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">Chrono<span>Guessr</span></div>
  <div class="hud">
    <div class="pips" id="pips"></div>
    <div class="hud-block">
      <div class="hud-lbl">Score</div>
      <div class="hud-val" id="hud-score">0</div>
    </div>
  </div>
</header>

<div id="photo-wrap">
  <div id="photo-loading">
    <div class="darkroom-spinner"></div>
    <p>DEVELOPING PHOTO…</p>
  </div>
  <img id="photo" alt="Historical photo"/>
  <div id="photo-badge"></div>
  <div id="round-badge">1 / 5</div>
</div>

<div id="timeline-panel">
  <div class="film-holes" id="holes-top"></div>
  <div id="decade-bar"></div>
  <div id="slider-wrap">
    <input type="range" id="timeline-slider" min="1480" max="2020" step="1" value="1750" oninput="onSlider(this.value)">
  </div>
  <div id="year-readout" class="unset">· · · ·</div>
  <div class="film-holes" id="holes-bot"></div>
</div>

<div id="guess-footer">
  <button id="guess-btn" disabled onclick="submitGuess()">LOCK IN DATE</button>
</div>

</div><!-- .app -->

<!-- RESULT -->
<div id="result-overlay">
  <div class="res-inner">

    <div id="res-photo-wrap">
      <img id="res-photo" alt=""/>
      <div id="res-caption"></div>
    </div>

    <div id="res-timeline">
      <div class="tl-labels">
        <div class="tl-item">
          <div class="tl-item-lbl">Actual</div>
          <div class="tl-item-year actual" id="tl-actual">—</div>
        </div>
        <div class="tl-item" style="text-align:center">
          <div class="tl-item-lbl">Off by</div>
          <div class="tl-item-year" id="tl-diff" style="color:var(--paper);font-size:20px">—</div>
        </div>
        <div class="tl-item" style="text-align:right">
          <div class="tl-item-lbl">Your guess</div>
          <div class="tl-item-year guess" id="tl-guess">—</div>
        </div>
      </div>
      <div class="tl-bar-wrap" id="tl-bar">
        <div class="tl-connector" id="tl-conn"></div>
        <div class="tl-marker actual" id="tl-ma"></div>
        <div class="tl-marker guess"  id="tl-mg"></div>
      </div>
    </div>

    <div class="rcard">
      <div class="rtitle" id="rtitle">Round Score</div>
      <div class="rscore" id="rscore">0</div>
      <div class="rpts">points</div>
      <div class="rgrade" id="rgrade"></div>
      <div class="rdiff">Off by <span id="rdiff">—</span></div>
      <div class="ract">
        <button class="btn-p" id="next-btn" onclick="nextRound()">NEXT PHOTO →</button>
        <button class="btn-s" id="src-btn" onclick="viewSrc()">VIEW SOURCE ↗</button>
      </div>
    </div>

  </div>
</div>

<script>
const MIN = 1480, MAX = 2020, TOTAL = 5;

// Wikipedia article titles — images fetched via REST API (CORS-friendly)
const PHOTOS = [
  { wiki:'Lunch_atop_a_Skyscraper',          year:1932, caption:'"Lunch atop a Skyscraper" · New York City · Charles C. Ebbets' },
  { wiki:'Migrant_Mother',                    year:1936, caption:'Migrant Mother · Dorothea Lange · Farm Security Administration' },
  { wiki:'RMS_Titanic',                       year:1912, caption:'RMS Titanic · Southampton · April 1912' },
  { wiki:'Mona_Lisa',                         year:1507, caption:'Mona Lisa · Leonardo da Vinci · Louvre, Paris' },
  { wiki:'The_Starry_Night',                  year:1889, caption:'The Starry Night · Vincent van Gogh · MoMA, New York' },
  { wiki:'Brooklyn_Bridge',                   year:1898, caption:'Brooklyn Bridge · New York City · c.1898' },
  { wiki:'Golden_Gate_Bridge',                year:1937, caption:'Golden Gate Bridge · San Francisco · Opening year' },
  { wiki:'Pietà_(Michelangelo)',              year:1499, caption:"Michelangelo's Pietà · St. Peter's Basilica · Vatican" },
  { wiki:'Birth_of_Venus',                    year:1486, caption:'Birth of Venus · Sandro Botticelli · Uffizi Gallery, Florence' },
  { wiki:'Girl_with_a_Pearl_Earring',         year:1665, caption:'Girl with a Pearl Earring · Johannes Vermeer · Mauritshuis, The Hague' },
  { wiki:'The_Great_Wave_off_Kanagawa',       year:1831, caption:'The Great Wave off Kanagawa · Hokusai · Metropolitan Museum' },
  { wiki:'American_Gothic',                   year:1930, caption:'American Gothic · Grant Wood · Art Institute of Chicago' },
  { wiki:'Guernica',                          year:1937, caption:'Guernica · Pablo Picasso · Museo Reina Sofía, Madrid' },
  { wiki:'The_Persistence_of_Memory',         year:1931, caption:'The Persistence of Memory · Salvador Dalí · MoMA, New York' },
  { wiki:'Earthrise',                         year:1968, caption:'Earthrise · William Anders · Apollo 8 · NASA' },
  { wiki:'Tank_Man',                          year:1989, caption:'Tank Man · Tiananmen Square · Beijing' },
  { wiki:'V-J_Day_in_Times_Square',           year:1945, caption:'V-J Day in Times Square · Alfred Eisenstaedt · Life Magazine' },
  { wiki:'The_Creation_of_Adam',              year:1512, caption:'The Creation of Adam · Michelangelo · Sistine Chapel, Vatican' },
  { wiki:'Las_Meninas',                       year:1656, caption:'Las Meninas · Diego Velázquez · Museo del Prado, Madrid' },
  { wiki:'A_Sunday_on_La_Grande_Jatte',       year:1886, caption:'A Sunday on La Grande Jatte · Georges Seurat · Art Institute of Chicago' },
];

let rounds = [], curr = 0, totalScore = 0, selectedYear = null, currentPhoto = null;

window.addEventListener('DOMContentLoaded', () => {
  buildHoles();
  buildDecadeBar();
  buildPips();
  startGame();
});

function startGame() {
  const shuffled = [...PHOTOS].sort(() => Math.random() - .5);
  rounds = shuffled.slice(0, TOTAL);
  curr = 0; totalScore = 0;
  updateHUD();
  loadRound();
}

function buildHoles() {
  ['holes-top','holes-bot'].forEach(id => {
    const el = document.getElementById(id); el.innerHTML = '';
    for (let i = 0; i < 14; i++) { const h = document.createElement('div'); h.className='hole'; el.appendChild(h); }
  });
}

function buildDecadeBar() {
  const bar = document.getElementById('decade-bar'); bar.innerHTML = '';
  // Every 50 years gets a label tick, every 10 years gets a plain tick
  for (let y = MIN; y <= MAX; y += 50) {
    const t = document.createElement('div'); t.className='decade-tick'; t.id=`dt${y}`;
    const lbl = document.createElement('div'); lbl.className='decade-tick-lbl'; lbl.textContent=y;
    t.appendChild(lbl);
    t.onclick = () => { document.getElementById('timeline-slider').value=y; onSlider(y); };
    bar.appendChild(t);
  }
}

function buildPips() {
  const c = document.getElementById('pips'); c.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const p = document.createElement('div'); p.className='pip'+(i===0?' cur':''); p.id=`p${i}`; c.appendChild(p);
  }
}
function syncPips() {
  for (let i = 0; i < TOTAL; i++) {
    const p = document.getElementById(`p${i}`);
    if (p) p.className='pip'+(i<curr?' done':i===curr?' cur':'');
  }
}
function updateHUD() { document.getElementById('hud-score').textContent=totalScore.toLocaleString(); }

function loadRound() {
  selectedYear = null; currentPhoto = rounds[curr];
  document.getElementById('guess-btn').disabled = true;
  document.getElementById('guess-btn').textContent = 'LOCK IN DATE';
  document.getElementById('year-readout').textContent = '· · · ·';
  document.getElementById('year-readout').classList.add('unset');
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('round-badge').textContent = `${curr+1} / ${TOTAL}`;
  document.getElementById('photo-badge').style.display = 'none';
  document.getElementById('timeline-slider').value = Math.round((MIN+MAX)/2);
  // clear active ticks
  document.querySelectorAll('.decade-tick').forEach(t => t.classList.remove('active'));
  syncPips(); updateHUD();

  const img = document.getElementById('photo');
  const loading = document.getElementById('photo-loading');
  img.classList.remove('loaded'); loading.style.display='flex';
  loading.innerHTML='<div class="darkroom-spinner"></div><p>DEVELOPING PHOTO…</p>';
  fetchWikiImage(currentPhoto);
}

async function fetchWikiImage(photo) {
  const img = document.getElementById('photo');
  const loading = document.getElementById('photo-loading');
  try {
    const title = encodeURIComponent(photo.wiki.replace(/ /g,'_'));
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${title}`,
      { headers: { 'Api-User-Agent': 'ChronoGuessr/1.0' } }
    );
    const data = await res.json();
    const imgUrl = data.originalimage?.source || data.thumbnail?.source;
    if (!imgUrl) throw new Error('No image');

    img.onload = () => {
      loading.style.display='none'; img.classList.add('loaded');
      document.getElementById('photo-badge').textContent=`PHOTOGRAPH · ${curr+1} OF ${TOTAL}`;
      document.getElementById('photo-badge').style.display='block';
      // store resolved URL for result screen
      currentPhoto._resolvedUrl = imgUrl;
    };
    img.onerror = () => {
      loading.innerHTML='<p style="color:var(--muted)">PHOTO UNAVAILABLE</p>';
    };
    img.src = imgUrl;
  } catch(e) {
    loading.innerHTML='<p style="color:var(--muted)">PHOTO UNAVAILABLE</p>';
    console.error('Wiki fetch failed:', e);
  }
}

function onSlider(val) {
  const y = parseInt(val);
  selectedYear = y;
  document.getElementById('year-readout').textContent = y;
  document.getElementById('year-readout').classList.remove('unset');
  document.getElementById('guess-btn').disabled = false;
  document.getElementById('guess-btn').textContent = `LOCK IN ${y}`;
  // highlight nearest 50yr tick
  document.querySelectorAll('.decade-tick').forEach(t => {
    const ty = parseInt(t.id.replace('dt',''));
    t.classList.toggle('active', Math.abs(ty - y) < 26);
  });
}

function submitGuess() {
  if (selectedYear===null) return;
  const diff = Math.abs(selectedYear - currentPhoto.year);
  const pts = Math.max(0, Math.round(5000 - diff * 75));
  totalScore += pts;
  showResult(pts, diff);
}

function showResult(pts, diff) {
  document.getElementById('res-photo').src = currentPhoto._resolvedUrl || '';
  document.getElementById('res-caption').textContent = currentPhoto.caption;
  document.getElementById('tl-actual').textContent = currentPhoto.year;
  document.getElementById('tl-guess').textContent = selectedYear;
  document.getElementById('tl-diff').textContent = diff===0 ? 'exact!' : `${diff} yr${diff===1?'':'s'}`;

  // Position bar markers
  const range = MAX - MIN;
  const ap = ((currentPhoto.year - MIN) / range) * 100;
  const gp = ((selectedYear - MIN) / range) * 100;
  document.getElementById('tl-ma').style.left = `${ap}%`;
  document.getElementById('tl-mg').style.left = `${gp}%`;
  const cl = Math.min(ap,gp), cw = Math.abs(ap-gp);
  const conn = document.getElementById('tl-conn');
  conn.style.left=`${cl}%`; conn.style.width=`${cw}%`;

  document.getElementById('rtitle').textContent = curr<TOTAL-1?`Round ${curr+1}`:'Final Round';
  document.getElementById('rscore').textContent = pts.toLocaleString();
  document.getElementById('rdiff').textContent = diff===0?'exactly!': `${diff} year${diff===1?'':'s'}`;

  const g = document.getElementById('rgrade');
  if (diff===0)        { g.textContent='🎯 Perfect!';         g.className='rgrade g-perfect'; }
  else if (diff<=5)    { g.textContent='✨ Remarkable';        g.className='rgrade g-perfect'; }
  else if (diff<=15)   { g.textContent='👁 Sharp eye';         g.className='rgrade g-great'; }
  else if (diff<=35)   { g.textContent='📷 Good instinct';     g.className='rgrade g-ok'; }
  else                 { g.textContent='🕰 Keep studying';     g.className='rgrade g-miss'; }

  document.getElementById('next-btn').textContent = curr>=TOTAL-1?'🏆 FINAL SCORE':'NEXT PHOTO →';
  document.getElementById('src-btn').style.display = '';
  document.getElementById('result-overlay').classList.add('show');
  updateHUD();
}

function nextRound() {
  curr++;
  if (curr>=TOTAL) { showFinal(); return; }
  loadRound();
}

function showFinal() {
  document.getElementById('res-photo-wrap').style.display='none';
  document.getElementById('res-timeline').style.display='none';
  document.getElementById('rtitle').textContent='FINAL SCORE';
  document.getElementById('rscore').textContent=totalScore.toLocaleString();
  document.getElementById('rdiff').innerHTML=`out of <span>${(TOTAL*5000).toLocaleString()}</span> possible`;
  const pct = totalScore/(TOTAL*5000);
  const g = document.getElementById('rgrade');
  if (pct>.85)      { g.textContent='🏆 Historian';           g.className='rgrade g-perfect'; }
  else if (pct>.65) { g.textContent='📚 Archivist';            g.className='rgrade g-great'; }
  else if (pct>.40) { g.textContent='🕰 Time Traveller';       g.className='rgrade g-ok'; }
  else              { g.textContent='📷 Amateur Antiquarian';   g.className='rgrade g-miss'; }
  const nb=document.getElementById('next-btn');
  nb.textContent='↺ DEVELOP NEW ROLL'; nb.onclick=()=>location.reload();
  document.getElementById('src-btn').style.display='none';
  document.getElementById('result-overlay').classList.add('show');
}

function viewSrc() { if (currentPhoto&&currentPhoto.wiki) window.open(`https://en.wikipedia.org/wiki/${currentPhoto.wiki}`,'_blank'); }
</script>
</body>
</html>
